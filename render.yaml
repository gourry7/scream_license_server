# Render Blueprint: https://render.com/docs/blueprint-spec
# Dashboard에서 New → Blueprint 로 이 저장소 연결해도 되고,
# Web Service 하나만 수동으로 만들어도 됩니다.

services:
  - type: web
    name: scream-license-server
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: node server.js
    healthCheckPath: /health
    envVars:
      # Render가 RENDER / RENDER_EXTERNAL_URL 도 넣음. 없으면 HTTP 통합 모드 강제.
      - key: LICENSE_HTTP_UNIFIED
        value: "1"
