# Render Blueprint: https://render.com/docs/blueprint-spec
# Dashboard에서 New → Blueprint 로 이 저장소 연결해도 되고,
# Web Service 하나만 수동으로 만들어도 됩니다.

services:
  - type: web
    name: scream-license-server
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: node server.js
    healthCheckPath: /health
    # 발급 이력: github.com/gourry7/scream_license_server 의 data/licenses.json
    # Dashboard → Environment → Secret 에 LICENSE_GITHUB_TOKEN 만 추가 (Contents 읽기/쓰기)
    envVars:
      # Render가 RENDER / RENDER_EXTERNAL_URL 도 넣음. 없으면 HTTP 통합 모드 강제.
      - key: LICENSE_HTTP_UNIFIED
        value: "1"
      - key: LICENSE_GITHUB_REPO
        value: gourry7/scream_license_server
